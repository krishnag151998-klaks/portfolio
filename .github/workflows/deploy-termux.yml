name: Deploy Portfolio to Android Phone

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    # Runs DIRECTLY on your Android phone (no SSH needed!)
    runs-on: [self-hosted, android, arm64]

    steps:
      # 1. Checkout latest code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Pull latest code into portfolio folder inside Debian
      - name: Pull Latest Code
        run: |
          cd /root/portfolio
          git fetch origin main
          git reset --hard origin/main
          echo "✅ Code updated to: $(git log -1 --oneline)"

      # 3. Reload nginx (no restart needed — just reload config)
      - name: Reload nginx
        run: |
          nginx -s reload
          echo "✅ nginx reloaded"

      # 4. Smoke test — confirm site is up
      - name: Smoke Test
        run: |
          sleep 2
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Site is live! HTTP $STATUS"
          else
            echo "❌ Site returned HTTP $STATUS"
            exit 1
          fi
