name: Deploy Portfolio to Android Phone

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  notify:
    # Runs on GitHub's servers — just validates the push happened
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trigger Webhook Deploy
        run: |
          echo "✅ Push received — triggering webhook on Android phone..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '{}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | awk '{print $2}')" \
            -d '{}' \
            https://deploy.gkchosting.dpdns.org/deploy || echo "000")
          echo "Webhook response: $RESPONSE"
          echo "🚀 Deployment triggered!"
